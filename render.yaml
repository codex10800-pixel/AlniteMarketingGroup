services:
  - type: web
    name: alnite-marketing-group
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate --noinput
    startCommand: gunicorn backend.alnite_site.wsgi --workers 3 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: 'False'
      - key: DJANGO_ALLOWED_HOSTS
        value: '*'
      - key: DJANGO_SECRET_KEY
        generateValue: true
    databases:
      - name: alnite-db
        databaseName: alnite_db
        user: alnite_user
        plan: starter
